<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Добавить рейс')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <a th:href="@{/admin}" class="back-link">← Назад в панель</a>
    <h1>Добавить новый рейс</h1>

    <div class="card">
        <form th:action="@{/admin/flights/save}" method="post" class="flight-form">

            <div class="form-group">
                <label for="flightNumber">Номер рейса</label>
                <input type="text" id="flightNumber" name="flightNumber"
                       placeholder="Например: SU-1234" required/>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="departureAirportId">Аэропорт вылета</label>
                    <select id="departureAirportId" name="departureAirportId" required>
                        <option value="">— Выберите аэропорт —</option>
                        <option th:each="airport : ${airports}"
                                th:value="${airport.id}"
                                th:text="${airport.iataCode + ' — ' + airport.city}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="arrivalAirportId">Аэропорт прилёта</label>
                    <select id="arrivalAirportId" name="arrivalAirportId" required>
                        <option value="">— Выберите аэропорт —</option>
                        <option th:each="airport : ${airports}"
                                th:value="${airport.id}"
                                th:text="${airport.iataCode + ' — ' + airport.city}"></option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="aircraftId">Воздушное судно</label>
                <select id="aircraftId" name="aircraftId" required>
                    <option value="">— Выберите воздушное судно —</option>
                    <option th:each="ac : ${aircraft}"
                            th:value="${ac.id}"
                            th:text="${ac.model + ' (' + ac.registrationNumber + ')'}"></option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="plannedDeparture">Плановое время вылета</label>
                    <input type="datetime-local" id="plannedDeparture"
                           name="plannedDeparture" required/>
                </div>
                <div class="form-group">
                    <label for="plannedArrival">Плановое время прилёта</label>
                    <input type="datetime-local" id="plannedArrival"
                           name="plannedArrival" required/>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Сохранить рейс</button>
                <a th:href="@{/admin}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
