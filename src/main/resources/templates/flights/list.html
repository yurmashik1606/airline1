<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Список рейсов')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="page-header">
        <h1>Расписание рейсов</h1>
        <form th:action="@{/flights}" method="get" class="search-form">
            <input type="text" name="query" th:value="${query}"
                   placeholder="Поиск по номеру рейса или коду аэропорта..."/>
            <button type="submit" class="btn btn-primary">Найти</button>
            <a th:if="${query}" th:href="@{/flights}" class="btn btn-secondary">Сбросить</a>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(flights)}" class="empty-state">
        <p>Рейсы не найдены.</p>
    </div>

    <table th:unless="${#lists.isEmpty(flights)}" class="table">
        <thead>
        <tr>
            <th>Номер рейса</th>
            <th>Маршрут</th>
            <th>Воздушное судно</th>
            <th>Вылет (план)</th>
            <th>Прилёт (план)</th>
            <th>Задержка</th>
            <th>Статус</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="flight : ${flights}">
            <td><strong th:text="${flight.flightNumber}"></strong></td>
            <td th:text="${flight.departureAirport.iataCode + ' → ' + flight.arrivalAirport.iataCode}"></td>
            <td th:text="${flight.aircraft.model}"></td>
            <td th:text="${#temporals.format(flight.plannedDeparture, 'dd.MM HH:mm')}"></td>
            <td th:text="${#temporals.format(flight.plannedArrival, 'dd.MM HH:mm')}"></td>
            <td>
                <span th:if="${flight.delayMinutes > 0}" class="delay-badge"
                      th:text="${flight.delayMinutes + ' мин'}"></span>
                <span th:unless="${flight.delayMinutes > 0}" class="text-muted">—</span>
            </td>
            <td>
                <span class="status-badge"
                      th:classappend="'status-' + ${flight.status.toLowerCase()}"
                      th:text="${flight.status}"></span>
            </td>
            <td>
                <a th:href="@{/flights/{id}(id=${flight.id})}" class="btn btn-sm">Подробнее</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
